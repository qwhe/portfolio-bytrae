<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>滴滴香插礼品设计 - Portfolio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --bg-secondary: #111111;
      --fg: #f5f0e8;
      --fg-muted: #8a8578;
      --accent: #c9a96e;
      --accent-dim: rgba(201,169,110,0.15);
      --border: #1e1e1e;
      --font-serif: 'Noto Serif SC', 'Georgia', serif;
      --font-sans: 'Noto Sans SC', 'Helvetica Neue', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      line-height: 1.7;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom Cursor */
    .cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      opacity: 0;
    }
    .cursor.hover {
      transform: translate(-50%, -50%) scale(2);
      background: rgba(201,169,110,0.15);
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--fg);
      text-decoration: none;
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      padding: 0.75rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: rgba(10,10,10,0.8);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      cursor: none;
    }
    .back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateX(-4px);
    }
    .back-btn svg {
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
    }
    .back-btn:hover svg {
      transform: translateX(-3px);
    }

    /* Hero */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.05);
      transition: transform 0.1s linear;
      will-change: transform;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10,10,10,0.3) 0%,
        rgba(10,10,10,0.1) 40%,
        rgba(10,10,10,0.6) 80%,
        rgba(10,10,10,1) 100%
      );
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 2rem;
      max-width: 900px;
    }
    .hero-title {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.3;
      color: var(--fg);
      margin-bottom: 1rem;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    .hero-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      font-size: 0.875rem;
      color: var(--fg-muted);
    }
    .hero-meta span {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .hero-scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--fg-muted);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      animation: float 2s ease-in-out infinite;
    }
    .hero-scroll-hint .line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--accent), transparent);
    }
    @keyframes float {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-8px); }
    }

    /* Project Info */
    .project-info {
      max-width: 900px;
      margin: 0 auto;
      padding: 5rem 2rem 4rem;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .project-info.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .tag {
      display: inline-block;
      padding: 0.35rem 1rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 0.8rem;
      color: var(--fg-muted);
      letter-spacing: 0.03em;
      transition: all 0.3s ease;
    }
    .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .project-description {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      line-height: 2;
      color: var(--fg);
      opacity: 0.85;
      white-space: pre-line;
      margin-bottom: 2rem;
    }
    .project-stats {
      display: flex;
      gap: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    .stat {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .stat-value {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--fg-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Gallery */
    .gallery {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 2rem 6rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    .gallery-item {
      overflow: hidden;
      border-radius: 8px;
      background: var(--bg-secondary);
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .gallery-item.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
      opacity: 0;
      animation: imgFadeIn 0.6s ease forwards;
    }
    .gallery-item:hover img {
      transform: scale(1.03);
    }
    @keyframes imgFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .gallery-full {
      width: 100%;
      aspect-ratio: 16/9;
    }
    .gallery-wide {
      width: calc(66.666% - 0.5rem);
      aspect-ratio: 4/3;
    }
    .gallery-narrow {
      width: calc(33.333% - 1rem);
      aspect-ratio: 3/4;
    }
    .gallery-center {
      width: 70%;
      margin: 0 auto;
      aspect-ratio: 16/9;
    }

    /* Navigation */
    .project-nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
      display: flex;
      justify-content: space-between;
      gap: 2rem;
    }
    .nav-link {
      flex: 1;
      text-decoration: none;
      color: var(--fg);
      padding: 2rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: all 0.3s ease;
      cursor: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .nav-link:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .nav-prev { text-align: left; }
    .nav-next { text-align: right; }
    .nav-label {
      font-size: 0.75rem;
      color: var(--fg-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .nav-title {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.4;
      transition: color 0.3s ease;
    }
    .nav-link:hover .nav-title {
      color: var(--accent);
    }

    /* Footer */
    .detail-footer {
      text-align: center;
      padding: 3rem 2rem;
      border-top: 1px solid var(--border);
      color: var(--fg-muted);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .back-btn {
        top: 1rem;
        left: 1rem;
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
      }
      .hero-title {
        font-size: 1.75rem;
      }
      .project-info {
        padding: 3rem 1.5rem 2rem;
      }
      .project-description {
        font-size: 1rem;
        line-height: 1.8;
      }
      .gallery {
        padding: 1.5rem 1rem 4rem;
        gap: 1rem;
      }
      .gallery-wide,
      .gallery-narrow,
      .gallery-full,
      .gallery-center {
        width: 100%;
        aspect-ratio: auto;
      }
      .gallery-full img,
      .gallery-wide img,
      .gallery-narrow img,
      .gallery-center img {
        aspect-ratio: 4/3;
      }
      .project-nav {
        flex-direction: column;
        padding: 0 1.5rem 4rem;
      }
      body { cursor: auto; }
      .cursor { display: none; }
    }
  </style>
</head>
<body>
  <!-- Custom Cursor -->
  <div class="cursor" id="cursor"></div>

  <!-- Back Button -->
  <a href="../index.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Back
  </a>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-bg">
      <img src="../images/works/didi-incense/didi-incense-cover.jpg" alt="滴滴香插礼品设计" id="heroImg">
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title">滴滴香插礼品设计</h1>
      <div class="hero-meta">
        <span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          11,510 views
        </span>
        <span>7年前</span>
      </div>
    </div>
    <div class="hero-scroll-hint">
      <span>SCROLL</span>
      <div class="line"></div>
    </div>
  </section>

  <!-- Project Info -->
  <section class="project-info" id="projectInfo">
    <div class="project-tags">
      <span class="tag">工业/产品</span><span class="tag">生活用品</span><span class="tag">香插</span><span class="tag">滴滴</span><span class="tag">线香</span>
    </div>
    <p class="project-description">给滴滴定制的高端礼品，红铜材质，结合滴滴logo设计的香插。
设计：Jero
包装：刘叶楠
LOGO 可旋转

硫酸纸图案</p>
    <div class="project-stats">
      <div class="stat">
        <span class="stat-value">11,510</span>
        <span class="stat-label">Views</span>
      </div>
      <div class="stat">
        <span class="stat-value">6</span>
        <span class="stat-label">Images</span>
      </div>
      <div class="stat">
        <span class="stat-value">5</span>
        <span class="stat-label">Tags</span>
      </div>
    </div>
  </section>

  <!-- Gallery -->
  <section class="gallery" id="gallery">
      <div class="gallery-item gallery-full">
        <img src="../images/works/didi-incense/didi-incense-01.jpg" alt="滴滴香插礼品设计 - Image 1" loading="lazy">
      </div>
      <div class="gallery-item gallery-wide">
        <img src="../images/works/didi-incense/didi-incense-02.jpg" alt="滴滴香插礼品设计 - Image 2" loading="lazy">
      </div>
      <div class="gallery-item gallery-narrow">
        <img src="../images/works/didi-incense/didi-incense-03.jpg" alt="滴滴香插礼品设计 - Image 3" loading="lazy">
      </div>
      <div class="gallery-item gallery-wide">
        <img src="../images/works/didi-incense/didi-incense-04.jpg" alt="滴滴香插礼品设计 - Image 4" loading="lazy">
      </div>
      <div class="gallery-item gallery-center">
        <img src="../images/works/didi-incense/didi-incense-05.jpg" alt="滴滴香插礼品设计 - Image 5" loading="lazy">
      </div>
  </section>

  <!-- Navigation -->
  <nav class="project-nav">

      <a href="baidu-zhixiao-duanwu.html" class="nav-link nav-prev">
        <span class="nav-label">Previous</span>
        <span class="nav-title">2019百度直销端午员工礼品</span>
      </a>

      <a href="sogou-translate.html" class="nav-link nav-next">
        <span class="nav-label">Next</span>
        <span class="nav-title">搜狗翻译宝礼盒</span>
      </a>
  </nav>

  <!-- Footer -->
  <footer class="detail-footer">
    Portfolio &copy; 2024 &mdash; All works are original designs
  </footer>

  <script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    let cursorVisible = false;

    if (window.matchMedia('(pointer: fine)').matches) {
      document.addEventListener('mousemove', (e) => {
        if (!cursorVisible) {
          cursor.style.opacity = '1';
          cursorVisible = true;
        }
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });

      document.querySelectorAll('a, .gallery-item, .tag, .back-btn, .nav-link').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
      });
    } else {
      cursor.style.display = 'none';
    }

    // Parallax on hero image
    const heroImg = document.getElementById('heroImg');
    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      if (scrollY < window.innerHeight) {
        heroImg.style.transform = 'scale(1.05) translateY(' + (scrollY * 0.3) + 'px)';
      }
    }, { passive: true });

    // Intersection Observer for scroll animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.1,
      rootMargin: '0px 0px -50px 0px'
    });

    document.querySelectorAll('.scroll-animate, .project-info').forEach(el => {
      observer.observe(el);
    });

    // Stagger gallery animations
    const galleryObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const items = entry.target.querySelectorAll('.gallery-item');
          items.forEach((item, i) => {
            setTimeout(() => {
              item.classList.add('visible');
            }, i * 120);
          });
          galleryObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.05 });

    const gallery = document.querySelector('.gallery');
    if (gallery) galleryObserver.observe(gallery);
  </script>
</body>
</html>
